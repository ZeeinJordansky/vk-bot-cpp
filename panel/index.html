<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>VK Бот Панель</title>
<style>body{font-family:Arial;background:#222;color:#0f0;padding:20px;}</style>
</head>
<body>
<h1>🎮 VK Игровой Бот</h1>
<p>Статус: <span id="status">🟢</span></p>
<button onclick="toggle()">Переключить</button>
<div id="logs" style="height:400px;overflow:auto;background:#111;padding:10px;margin:10px 0;"></div>
<script>
const ws = new WebSocket('ws://localhost:3000');
ws.onmessage = e => {
  const d = JSON.parse(e.data);
  if(d.type==='log') document.getElementById('logs').innerHTML += d.data + '<br>';
};
function toggle(){fetch('/api/toggle',{method:'POST'}).then(r=>r.json()).then(d=>document.getElementById('status').innerHTML=d.status);}
</script>
</body>
</html>
